name: Quarkus Native Build (GraalVM)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # GraalVM (stable + supported)
      # -----------------------------
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '23'
          java-version: '21'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Maven cache
      # -----------------------------
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build native Quarkus app
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -Pnative -DskipTests -Dquarkus.native.container-build=true

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native
          path: target/*-runner