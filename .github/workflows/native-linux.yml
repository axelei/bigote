name: Quarkus Native Build (Mandrel + Java 24)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Java 24 (Temurin)
      # -----------------------------
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          cache: maven

      # -----------------------------
      # Install Mandrel (GraalVM for Quarkus)
      # -----------------------------
      - name: Set up Mandrel (native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: mandrel
          java-version: 24
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Build native Quarkus app
      # -----------------------------
      - name: Build native image
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -Pnative -DskipTests -Dquarkus.native.container-build=true

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native
          path: target/*-runner